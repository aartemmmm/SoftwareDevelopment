services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store_db
    ports:
      - "5434:5432"
    volumes:
      - store_pg_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: store_db
      DB_USER: postgres
      DB_PASS: postgres
    command: sh -c "sleep 3 && python -m app.main"

volumes:
  store_pg_data:
